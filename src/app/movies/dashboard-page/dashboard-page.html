<p>Anzahl Filme: {{ movies().length }}</p>

@for (m of movies(); track m.id) {
    <app-movie-card
        [movie]="m"
        [minRating]="1"
        [maxRating]="5"
        (rateUp)="doRateUp($event)"
        (rateDown)="doRateDown($event)"
        (delete)="doDeleteMovie($event)"
        />
}

<a sbb-button [routerLink]="['/movies/create']">
  Neuen Film erfassen
</a>
