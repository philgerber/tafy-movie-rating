<article class="card mb-4">
    <div class="card-body bg-light">
        <img class="img-thumbnail float-end" alt=""
            src={{ movie().imageUrl }}>
        <header class="card-title">
            <h2> {{ movie().title }} </h2>
            <app-rating-display [value]="movie().rating" />
        </header>
        <p> {{ movie().description }} </p>
        <p> {{ movie().year }} </p>
        <button type="button"
            class="btn btn-green"
            aria-label="Rating erhöhen"
            title="Rating erhöhen" (click)="doRateUp()"
            [disabled]="movie().rating >= maxRating()"
            > + </button>
        <button type="button"
            class="btn btn-red"
            aria-label="Rating verringern"
            title="Rating verringern" (click)="doRateDown()"
            [disabled]="movie().rating <= minRating()"
            > - </button>

        <button type="button" class="btn btn-yellow" (click)="doDelete()">Löschen</button>
        <a [routerLink]="['/movies', movie().id]">Details</a>
        <!-- <a routerLink="/movies/{{ movie().id }}">Details</a> -->

    </div>
</article>
